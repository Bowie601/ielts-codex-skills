<div id="ielts-paraphrase-model-template">
  <section aria-label="Band 8 paraphrase model with selectable phrases">
    <div class="paragraphs">
      <article class="paragraph-block paragraph-one">
        <div class="viz-row paragraph-meta">
          <span class="viz-badge">Model sentence</span>
          <span class="text-muted">Band 8 introduction</span>
        </div>

        <p>
          The chart
          <button type="button" class="phrase-highlight" data-key="data-structure" data-selected="true" aria-current="true">compares the proportions of households owning and renting accommodation</button>
          in a European country
          <button type="button" class="phrase-highlight" data-key="time-frame">between 1995 and 2020</button>.
        </p>
      </article>
    </div>

    <div class="card selected-explanation" role="status" aria-live="polite">
      <span id="ielts-paraphrase-model-template-explanation">结构改写：把关系从句压缩成自然的 V-ing 名词结构。</span>
    </div>
  </section>
</div>

<style>
  #ielts-paraphrase-model-template .paragraphs {
    display: grid;
    gap: 1.35rem;
  }

  #ielts-paraphrase-model-template .paragraph-block {
    display: grid;
    gap: 0.65rem;
    padding-inline-start: 1rem;
    border-inline-start: 3px solid var(--phrase-color);
  }

  #ielts-paraphrase-model-template .paragraph-one {
    --phrase-color: var(--viz-series-1);
  }

  #ielts-paraphrase-model-template .paragraph-meta {
    justify-content: flex-start;
  }

  #ielts-paraphrase-model-template p {
    margin: 0;
  }

  #ielts-paraphrase-model-template .phrase-highlight {
    appearance: none;
    display: inline;
    margin: 0;
    padding: 0 0.12em;
    border: 0;
    border-bottom: 2px solid var(--phrase-color);
    border-radius: 0.18em;
    color: var(--foreground);
    background: color-mix(in srgb, var(--phrase-color) 18%, transparent);
    font: inherit;
    text-align: start;
    cursor: pointer;
  }

  #ielts-paraphrase-model-template .phrase-highlight[data-selected="true"] {
    background: color-mix(in srgb, var(--phrase-color) 32%, transparent);
  }

  #ielts-paraphrase-model-template .phrase-highlight:focus-visible {
    outline: 2px solid var(--ring);
    outline-offset: 2px;
  }

  #ielts-paraphrase-model-template .selected-explanation {
    margin-top: 1rem;
  }
</style>

<script>
  (() => {
    const root = document.getElementById('ielts-paraphrase-model-template');
    const explanation = document.getElementById('ielts-paraphrase-model-template-explanation');
    const explanations = {
      'data-structure': '结构改写：把关系从句压缩成自然的 V-ing 名词结构。',
      'time-frame': '时间范围：between year and year 用于明确的起止年份。'
    };

    root.querySelectorAll('button[data-key]').forEach((button) => {
      button.addEventListener('click', () => {
        root.querySelectorAll('button[data-key]').forEach((item) => {
          item.removeAttribute('data-selected');
          item.removeAttribute('aria-current');
        });

        button.setAttribute('data-selected', 'true');
        button.setAttribute('aria-current', 'true');
        explanation.textContent = explanations[button.dataset.key];
      });
    });
  })();
</script>
